# Nova syntax for micro -- generated by tools/genhl.lua, do not edit
filetype: nova

detect:
    filename: "\\.nova$"

rules:
    - type: "\\b(int|float|str|string|char|bool|void)\\b"
    - statement: "\\b(fn|if|else|for|return|typedef|switch|case|default|enum|break|continue|try|catch|except|throw|import|as)\\b"
    - constant: "\\b(true|false|null)\\b"
    - constant.number: "\\b[0-9]+(\\.[0-9]+)?\\b"
    - symbol.operator: "[-+*/%=<>!&|^~?:]"

    - constant.string:
        start: "\""
        end: "\""
        skip: "\\."
        rules: []

    - comment:
        start: "//"
        end: "$"
        rules: []

    - comment:
        start: "/\\*"
        end: "\\*/"
        rules: []
